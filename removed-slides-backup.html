<!-- HTML: SLIDE 2 — Notre Dame Fire                              -->
<!-- ============================================================ -->
<!-- Background image: notre-dame-fire.jpg -->

<div class="slide-content" id="slide-2-content" aria-label="Notre Dame fire slide">
  <div class="slide-inner">
    <div class="slide-heading text-fill-red" id="s2-line1">In 2019, Notre Dame burned.</div>
    <div class="slide-heading text-fill-red" id="s2-line2">France was shocked.</div>
    <span class="slide-gap"></span>
    <div class="slide-subheading text-fill-white" id="s2-line3">
      The President of France promised to rebuild it within five years.
    </div>
  </div>
</div>


<!-- ============================================================ -->
<!-- HTML: SLIDE 3 — Notre Dame Rebuilt                           -->
<!-- ============================================================ -->

<div class="slide-content" id="slide-3-content" aria-label="Notre Dame rebuilt slide">
  <div class="slide-inner">
    <div class="slide-stat text-fill-white" id="s3-line1">Five years later, Notre Dame stands tall.</div>
    <span class="slide-gap"></span>
    <span class="slide-number text-fill-red" id="s3-line2">It cost &euro;700 million.</span>
  </div>
</div>


<!-- ============================================================ -->
<!-- HTML: SLIDE 4 — 60 Notre Dames                               -->
<!-- ============================================================ -->

<div class="slide-content" id="slide-4-content" aria-label="Cost comparison slide">
  <div class="slide-inner">
    <div class="slide-subheading text-fill-white" id="s4-line1">
      Based on the current estimate of &pound;39 billion, France could have built&hellip;
    </div>
    <span class="slide-gap"></span>
    <span class="slide-number text-fill-red" id="s4-line2" style="font-size: clamp(60px, 10vw, 100px);">60 Notre Dames.</span>
    <div class="slide-subheading text-fill-white" id="s4-line3" style="margin-top: 12px;">For <u>one</u> Parliament.</div>
    <!-- Grid of 60 icons injected by JS -->
    <div class="notre-dame-grid" id="notre-dame-grid" aria-hidden="true"></div>
  </div>
</div>


<!-- ============================================================ -->
<!-- HTML: BACKGROUND LAYERS (for slides 2-4)                     -->
<!-- ============================================================ -->

<!-- Slide 2: Notre Dame fire -->
<img class="slide-bg" id="bg-fire" src="notre-dame-fire.jpg" alt="" role="presentation" />
<!-- Slides 3-4: dark background -->
<div class="slide-bg slide-bg-dark" id="bg-dark"></div>


<!-- ============================================================ -->
<!-- CSS: Text fill effect (used by slides 2-4)                   -->
<!-- ============================================================ -->
<style>
    .text-fill-red,
    .text-fill-white {
      color: #222;
      background-repeat: no-repeat;
      background-size: 0% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .text-fill-red {
      background-image: linear-gradient(to right, var(--accent-red), var(--accent-red));
    }

    .text-fill-white {
      background-image: linear-gradient(to right, #ffffff, #ffffff);
    }

    .slide-gap {
      display: block;
      height: 24px;
    }

    .notre-dame-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 32px;
      max-width: 560px;
    }

    .notre-dame-grid img {
      width: 44px;
      height: 44px;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .notre-dame-grid img.revealed {
      opacity: 1;
      transform: scale(1);
    }

    .slide-bg-dark {
      background: #0d0d0d;
    }
</style>
